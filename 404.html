<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Page Not Found – FortunaDelClub</title>
  <meta name="robots" content="noindex"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/style.css"/>
  <style>
    .error-page { min-height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; }
    .error-inner { max-width: 520px; }
    .error-code { font-family: var(--font-head); font-size: 6rem; color: var(--gold); font-weight: 700; line-height: 1; margin-bottom: 16px; }
    .error-title { font-family: var(--font-head); font-size: 1.8rem; color: var(--deep); margin-bottom: 12px; }
    .error-msg { color: var(--muted); margin-bottom: 28px; }
    .error-links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<header role="banner">
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <div class="logo-mark">FDC</div>
      <div><span class="logo-name">FortunaDelClub</span><span class="logo-tag">The Lottery Assistant</span></div>
    </a>
  </div>
</header>

<main>
  <div class="error-page">
    <div class="error-inner">
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-msg">The page you're looking for doesn't exist or may have moved. Please use the links below to navigate.</p>
      <div class="error-links">
        <a href="index.html" class="btn-primary">← Go Home</a>
        <a href="contact.html" class="btn-outline">Contact Us</a>
      </div>
    </div>
  </div>
</main>

<footer role="contentinfo" style="text-align:center;padding:24px;background:var(--deep);color:#8A7A60;font-size:.85rem">
  <p>© 2024 FortunaDelClub. <a href="index.html" style="color:var(--muted)">Home</a></p>
</footer>
<script src="assets/main.js"></script>
</body>
</html>
